<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recall English</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #6f7890;
      --line: #e2e6ef;
      --accent: #596aa8;
      --accent-soft: #e9edfb;
      --good: #e9f7ee;
      --bad: #fdecec;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
                   "Noto Sans KR", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      width: min(680px, 100%);
      margin: 0 auto;
      padding: 24px 18px 40px;
    }

    h1 {
      margin: 8px 0 6px;
      font-size: 30px;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 24px;
      text-align: center;
      color: var(--muted);
    }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .mode-btn {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 16px;
      padding: 16px 10px;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
    }

    .mode-btn.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 8px 2px 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .small-btn {
      border: 0;
      background: transparent;
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }

    .card {
      min-height: 360px;
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 12px 32px rgba(38, 47, 77, 0.10);
      padding: 34px 26px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: transform .15s ease;
    }

    .card:active { transform: scale(.99); }

    .label {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 20px;
      font-weight: 700;
    }

    .prompt {
      font-size: clamp(26px, 5vw, 38px);
      line-height: 1.45;
      font-weight: 800;
      white-space: pre-line;
    }

    .example-ko {
      margin-top: 20px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
      white-space: pre-line;
    }

    .tap-hint {
      margin-top: 28px;
      color: var(--muted);
      font-size: 14px;
    }

    .nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    .nav button {
      border: 0;
      border-radius: 15px;
      padding: 15px 10px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .prev { background: #e9ecf3; color: var(--text); }
    .next { background: var(--accent); color: white; }

    .score-row {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .score-row.show { display: grid; }

    .score-row button {
      border: 0;
      border-radius: 15px;
      padding: 14px 10px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .wrong { background: var(--bad); color: #a33a3a; }
    .correct { background: var(--good); color: #287a47; }

    .result {
      display: none;
      background: var(--card);
      border-radius: 20px;
      padding: 24px;
      margin-top: 16px;
      text-align: center;
      border: 1px solid var(--line);
    }

    .result.show { display: block; }

    .result strong {
      display: block;
      font-size: 28px;
      margin-bottom: 8px;
    }

    .footer-note {
      margin-top: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 500px) {
      .mode-grid { grid-template-columns: 1fr; }
      .card { min-height: 330px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Recall English</h1>
    <p class="subtitle">공부 방식을 고르고, 카드를 눌러 정답을 확인하세요.</p>

    <section class="mode-grid">
      <button class="mode-btn active" data-mode="ko-en">뜻 → 영어</button>
      <button class="mode-btn" data-mode="en-ko">영어 → 뜻</button>
      <button class="mode-btn" data-mode="blank">예문 빈칸</button>
      <button class="mode-btn" data-mode="random">랜덤 모드</button>
    </section>

    <div class="toolbar">
      <span id="counter">1 / 2</span>
      <button class="small-btn" id="shuffleBtn">카드 섞기</button>
    </div>

    <section class="card" id="card" aria-live="polite">
      <div class="label" id="label"></div>
      <div class="prompt" id="prompt"></div>
      <div class="example-ko" id="exampleKo"></div>
      <div class="tap-hint" id="tapHint">카드를 누르면 정답이 보여요.</div>
    </section>

    <div class="score-row" id="scoreRow">
      <button class="wrong" id="wrongBtn">틀렸어요</button>
      <button class="correct" id="correctBtn">맞았어요</button>
    </div>

    <div class="nav">
      <button class="prev" id="prevBtn">← 이전</button>
      <button class="next" id="nextBtn">다음 →</button>
    </div>

    <section class="result" id="result">
      <strong id="resultScore"></strong>
      <div id="resultText"></div>
      <button class="small-btn" id="retryWrongBtn" style="margin-top:14px;">
        틀린 카드만 다시 보기
      </button>
    </section>

    <p class="footer-note">
      카드 내용은 HTML 파일 안의 <b>cards</b> 부분만 수정하면 됩니다.
    </p>
  </main>

  <script>
    /*
      ==============================
      카드 내용은 여기만 수정하세요.
      ==============================

      meaning: 한글 뜻
      expression: 기본 영어 표현
      example: 빈칸이 포함된 영어 예문
      exampleKo: 예문의 한글 뜻
      blankAnswer: 빈칸의 실제 정답
    */

    const originalCards = [
      {
        meaning: "작동이 멈추다, 고장 나다",
        expression: "give out",
        example: "My phone ______ ______ during the trip.",
        exampleKo: "여행 중에 내 휴대폰이 고장 났어.",
        blankAnswer: "gave out"
      },
      {
        meaning: "완전히 망가진, 고장 난",
        expression: "shot",
        example: "My old laptop is completely ______.",
        exampleKo: "내 오래된 노트북은 완전히 망가졌어.",
        blankAnswer: "shot"
      }
    ];

    let cards = [...originalCards];
    let mode = "ko-en";
    let current = 0;
    let showingAnswer = false;
    let correctCount = 0;
    let answeredCount = 0;
    let wrongCards = [];

    const cardEl = document.getElementById("card");
    const labelEl = document.getElementById("label");
    const promptEl = document.getElementById("prompt");
    const exampleKoEl = document.getElementById("exampleKo");
    const tapHintEl = document.getElementById("tapHint");
    const counterEl = document.getElementById("counter");
    const scoreRowEl = document.getElementById("scoreRow");
    const resultEl = document.getElementById("result");
    const resultScoreEl = document.getElementById("resultScore");
    const resultTextEl = document.getElementById("resultText");
    const retryWrongBtn = document.getElementById("retryWrongBtn");

    function randomModeForCard() {
      const choices = ["ko-en", "en-ko", "blank"];
      return choices[Math.floor(Math.random() * choices.length)];
    }

    function activeMode() {
      return mode === "random" ? randomModeForCard() : mode;
    }

    function renderCard() {
      showingAnswer = false;
      scoreRowEl.classList.remove("show");
      resultEl.classList.remove("show");

      const item = cards[current];
      const chosenMode = activeMode();
      cardEl.dataset.activeMode = chosenMode;

      counterEl.textContent = `${current + 1} / ${cards.length}`;
      tapHintEl.textContent = "카드를 누르면 정답이 보여요.";

      if (chosenMode === "ko-en") {
        labelEl.textContent = "뜻을 보고 영어 표현을 말해보세요.";
        promptEl.textContent = item.meaning;
        exampleKoEl.textContent = "";
      }

      if (chosenMode === "en-ko") {
        labelEl.textContent = "영어 표현의 뜻을 말해보세요.";
        promptEl.textContent = item.expression;
        exampleKoEl.textContent = "";
      }

      if (chosenMode === "blank") {
        labelEl.textContent = "빈칸에 들어갈 표현을 말해보세요.";
        promptEl.textContent = item.example;
        exampleKoEl.textContent = item.exampleKo;
      }
    }

    function revealAnswer() {
      if (showingAnswer) return;

      const item = cards[current];
      const chosenMode = cardEl.dataset.activeMode;

      if (chosenMode === "ko-en") {
        promptEl.textContent = item.expression;
        labelEl.textContent = "정답";
      }

      if (chosenMode === "en-ko") {
        promptEl.textContent = item.meaning;
        labelEl.textContent = "정답";
      }

      if (chosenMode === "blank") {
        promptEl.textContent = item.blankAnswer;
        labelEl.textContent = "정답";
        exampleKoEl.textContent = item.example.replace(/_+/g, item.blankAnswer);
      }

      tapHintEl.textContent = "맞았는지 선택하세요.";
      showingAnswer = true;
      scoreRowEl.classList.add("show");
    }

    function goNext() {
      current++;
      if (current >= cards.length) current = 0;
      renderCard();
    }

    function goPrev() {
      current--;
      if (current < 0) current = cards.length - 1;
      renderCard();
    }

    function markAnswer(isCorrect) {
      answeredCount++;

      if (isCorrect) {
        correctCount++;
      } else {
        wrongCards.push(cards[current]);
      }

      if (answeredCount >= cards.length) {
        showResult();
      } else {
        goNext();
      }
    }

    function showResult() {
      const percent = Math.round((correctCount / answeredCount) * 100);
      resultScoreEl.textContent = `${correctCount} / ${answeredCount}`;
      resultTextEl.textContent = `정답률 ${percent}%`;
      retryWrongBtn.style.display = wrongCards.length ? "inline-block" : "none";
      resultEl.classList.add("show");
      scoreRowEl.classList.remove("show");
    }

    function shuffleCards() {
      for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      current = 0;
      correctCount = 0;
      answeredCount = 0;
      wrongCards = [];
      renderCard();
    }

    function setMode(newMode) {
      mode = newMode;
      document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === newMode);
      });
      current = 0;
      cards = [...originalCards];
      correctCount = 0;
      answeredCount = 0;
      wrongCards = [];
      renderCard();
    }

    document.querySelectorAll(".mode-btn").forEach(btn => {
      btn.addEventListener("click", () => setMode(btn.dataset.mode));
    });

    cardEl.addEventListener("click", revealAnswer);
    document.getElementById("nextBtn").addEventListener("click", goNext);
    document.getElementById("prevBtn").addEventListener("click", goPrev);
    document.getElementById("shuffleBtn").addEventListener("click", shuffleCards);
    document.getElementById("correctBtn").addEventListener("click", () => markAnswer(true));
    document.getElementById("wrongBtn").addEventListener("click", () => markAnswer(false));

    retryWrongBtn.addEventListener("click", () => {
      cards = [...wrongCards];
      current = 0;
      correctCount = 0;
      answeredCount = 0;
      wrongCards = [];
      renderCard();
    });

    renderCard();
  </script>
</body>
</html>
